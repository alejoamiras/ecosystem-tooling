name: Update Baselines

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - '.github/workflows/update-baselines.yml'
      - '.github/workflows/_update-baseline.yml'
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: update-baselines-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # skip-proving on BOTH baselines and PR benches — comparisons must be like-for-like
  # (review finding). Full-proving baselines return when runner capacity allows (roadmap).
  private-fee-juice:
    name: private-fee-juice baseline
    uses: ./.github/workflows/_update-baseline.yml
    with:
      package-dir: packages/private-fee-juice
      skip-proving: true
