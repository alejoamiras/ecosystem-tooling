name: Release

# Publishes all three packages at the lockstep version via npm trusted publishing
# (OIDC + provenance, tokenless). Re-validates the exact release sha in-workflow
# BEFORE any publish — never trusts a prior PR run (plan D20). GitHub-hosted
# runners only (trusted-publishing requirement). rc versions → `rc` dist-tag,
# stable → `latest`. Publish order: benchmark → standards → fee-payment.

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (no v prefix) — must equal every package version AND config.aztecVersion
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate:
    name: Validate version input
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Check main branch
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Releases run from main only (got ${GITHUB_REF})" >&2
            exit 1
          fi
      - name: Check version consistency
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if ! printf '%s' "$INPUT_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$'; then
            echo "Invalid semver input: $INPUT_VERSION" >&2; exit 1
          fi
          AZTEC_VERSION=$(node -p "require('./package.json').config.aztecVersion")
          if [ "$INPUT_VERSION" != "$AZTEC_VERSION" ]; then
            echo "Input $INPUT_VERSION != config.aztecVersion $AZTEC_VERSION" >&2; exit 1
          fi
          for pkg in aztec-benchmark aztec-standards aztec-fee-payment; do
            PKG_VERSION=$(node -p "require('./packages/$pkg/package.json').version")
            if [ "$INPUT_VERSION" != "$PKG_VERSION" ]; then
              echo "Input $INPUT_VERSION != packages/$pkg version $PKG_VERSION" >&2; exit 1
            fi
          done
          echo "Version $INPUT_VERSION consistent across root config + all packages"

  standards-checks:
    name: Standards
    needs: validate
    uses: ./.github/workflows/_package-checks.yml
    with:
      package-dir: packages/aztec-standards

  fee-payment-checks:
    name: Fee Payment
    needs: validate
    uses: ./.github/workflows/_package-checks.yml
    with:
      package-dir: packages/aztec-fee-payment

  benchmark-build:
    name: Benchmark build
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: bun install --frozen-lockfile
      - run: bun run --cwd packages/aztec-benchmark build
      - run: bun run --cwd packages/aztec-benchmark start --help

  publish:
    name: Publish (trusted publishing + provenance)
    needs: [validate, standards-checks, fee-payment-checks, benchmark-build]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-aztec
        with:
          start-local-network: 'false'
          run-compile: 'false'
          run-codegen: 'false'

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm (OIDC/provenance-capable CLI)
        run: |
          npm install -g npm@^11.5.2
          npm -v

      - name: Build all packages
        run: |
          bun run --cwd packages/aztec-benchmark build
          (cd packages/aztec-standards && aztec compile && aztec codegen target --outdir src/artifacts -f && bash scripts/build.sh)
          (cd packages/aztec-fee-payment && aztec compile && aztec codegen target --outdir src/artifacts -f && bunx tsc --project tsconfig.build.json)

      - name: Pack + verify tarball surfaces (pre-publish gate)
        run: bun scripts/verify-tarball.ts packages/aztec-benchmark packages/aztec-standards packages/aztec-fee-payment

      - name: Derive dist-tag from prerelease segment
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          case "$INPUT_VERSION" in
            *-*) TAG="${INPUT_VERSION#*-}"; TAG="${TAG%%.*}" ;;
            *) TAG="latest" ;;
          esac
          echo "DIST_TAG=$TAG" >> "$GITHUB_ENV"
          echo "Publishing with dist-tag: $TAG"

      - name: Publish (benchmark → standards → fee-payment, idempotent)
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          for pkg in aztec-benchmark aztec-standards aztec-fee-payment; do
            if [ "$(npm view "@alejoamiras/$pkg@$INPUT_VERSION" version 2>/dev/null || true)" = "$INPUT_VERSION" ]; then
              echo "@alejoamiras/$pkg@$INPUT_VERSION already published — skipping (re-run after partial failure)"
              npm dist-tag add "@alejoamiras/$pkg@$INPUT_VERSION" "$DIST_TAG" || true
              continue
            fi
            (cd "packages/$pkg" && npm publish --access public --provenance --tag "$DIST_TAG")
          done

      - name: Remediate canary-as-latest (best-effort — OIDC grants `npm publish` ONLY)
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          # Trusted-publishing credentials cover `npm publish` only (allowed-actions lockdown);
          # dist-tag mutations get E401 here BY DESIGN. Best-effort attempt, never fatal —
          # the runbook covers manual `npm dist-tag` with interactive 2FA when this warns.
          for pkg in aztec-benchmark aztec-standards aztec-fee-payment; do
            latest=$(npm view "@alejoamiras/$pkg" dist-tags.latest 2>/dev/null || true)
            case "$latest" in
              0.0.0-*)
                echo "latest for $pkg is a canary ($latest) — attempting removal (no latest until stable)"
                npm dist-tag rm "@alejoamiras/$pkg" latest \
                  || npm dist-tag add "@alejoamiras/$pkg@$INPUT_VERSION" latest \
                  || echo "WARN: dist-tag mutation unauthorized under OIDC — run the manual runbook step (docs/ci-pipeline.md)"
                ;;
            esac
          done

      - name: Assert published state (dist-tags + provenance)
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          fail=0
          for pkg in aztec-benchmark aztec-standards aztec-fee-payment; do
            # Read-API lag after publish can exceed several minutes — retry before judging.
            got=""
            for attempt in $(seq 1 30); do
              got=$(npm view "@alejoamiras/$pkg@$INPUT_VERSION" version 2>/dev/null || true)
              [ "$got" = "$INPUT_VERSION" ] && break
              echo "  view attempt $attempt for $pkg@$INPUT_VERSION: not visible yet, waiting 20s..."
              sleep 20
            done
            if [ "$got" != "$INPUT_VERSION" ]; then
              echo "ERROR: @alejoamiras/$pkg@$INPUT_VERSION not resolvable after 10min" >&2; fail=1
            fi
            tags=$(npm view "@alejoamiras/$pkg" dist-tags --json)
            echo "@alejoamiras/$pkg dist-tags: $tags"
            tagged=$(echo "$tags" | node -pe "JSON.parse(require('fs').readFileSync(0,'utf8'))['$DIST_TAG'] ?? ''")
            if [ "$tagged" != "$INPUT_VERSION" ]; then
              echo "ERROR: dist-tag $DIST_TAG for $pkg is '$tagged', expected $INPUT_VERSION" >&2; fail=1
            fi
            latest=$(echo "$tags" | node -pe "JSON.parse(require('fs').readFileSync(0,'utf8')).latest ?? ''")
            case "$latest" in
              0.0.0-*) echo "WARN: latest still points at a canary ($latest) for $pkg — OIDC cannot dist-tag; complete the manual runbook step" ;;
            esac
            att=$(npm view "@alejoamiras/$pkg@$INPUT_VERSION" dist.attestations.url 2>/dev/null || true)
            if [ -z "$att" ]; then
              echo "ERROR: no provenance attestations for @alejoamiras/$pkg@$INPUT_VERSION" >&2; fail=1
            fi
          done
          exit "$fail"

  tag-release:
    name: Tag + GitHub release
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Generate release notes
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          case "$INPUT_VERSION" in
            *-*) DIST_TAG="${INPUT_VERSION#*-}"; DIST_TAG="${DIST_TAG%%.*}" ;;
            *) DIST_TAG="latest" ;;
          esac
          cat > /tmp/release-notes.md <<'TEMPLATE'
          Aztec ecosystem packages, released in lockstep with **Aztec `__VERSION__`**. All three packages are published with [npm provenance attestations](https://docs.npmjs.com/generating-provenance-statements) via a tokenless OIDC pipeline that re-runs the full test matrix before publishing.

          ## 📦 Packages

          | Package | What it is |
          |---|---|
          | [`@alejoamiras/aztec-standards`](https://www.npmjs.com/package/@alejoamiras/aztec-standards) | Standardized Aztec contracts: token (AIP-20), vault (AIP-4626), NFT, escrow, dripper, proxy |
          | [`@alejoamiras/aztec-fee-payment`](https://www.npmjs.com/package/@alejoamiras/aztec-fee-payment) | Private Fee Payment Contract (FPC) + TypeScript SDK |
          | [`@alejoamiras/aztec-benchmark`](https://www.npmjs.com/package/@alejoamiras/aztec-benchmark) | Benchmark CLI + CI tooling (circuit gates, DA/L2 gas, proving) |

          ## 🚀 Install

          Use `__VERSION__` with an Aztec `__VERSION__` node/sandbox — `@aztec/*` peer dependencies install automatically. This release is also available under the `__DIST_TAG__` dist-tag.

          ```bash
          bun add @alejoamiras/aztec-standards@__VERSION__
          bun add @alejoamiras/aztec-fee-payment@__VERSION__
          bun add -D @alejoamiras/aztec-benchmark@__VERSION__
          ```

          Verify provenance end-to-end: `npm audit signatures`

          ## 📚 Docs & migration

          - Per-package usage: [aztec-standards](https://github.com/alejoamiras/ecosystem-tooling/tree/main/packages/aztec-standards#readme) · [aztec-fee-payment](https://github.com/alejoamiras/ecosystem-tooling/tree/main/packages/aztec-fee-payment#readme) · [aztec-benchmark](https://github.com/alejoamiras/ecosystem-tooling/tree/main/packages/aztec-benchmark#readme)
          - Migrating from `@defi-wonderland/*`: scope swap only, import paths unchanged — [migration table](https://github.com/alejoamiras/ecosystem-tooling#migrating-from-defi-wonderland)
          TEMPLATE
          sed -i "s/__VERSION__/$INPUT_VERSION/g; s/__DIST_TAG__/$DIST_TAG/g" /tmp/release-notes.md
      - name: Create tag and release
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          git tag "v$INPUT_VERSION"
          git push origin "v$INPUT_VERSION"
          case "$INPUT_VERSION" in
            *-*) PRERELEASE_FLAG="--prerelease" ;;
            *) PRERELEASE_FLAG="" ;;
          esac
          gh release create "v$INPUT_VERSION" --title "v$INPUT_VERSION" $PRERELEASE_FLAG \
            --notes-file /tmp/release-notes.md
