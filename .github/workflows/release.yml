name: Release

# Publishes both packages via npm trusted publishing (OIDC + provenance, tokenless).
# Re-validates the exact release sha in-workflow BEFORE any publish — never trusts a prior
# PR run. GitHub-hosted runners only (trusted-publishing requirement).
#
# Modes (plan aztec-5-stable D2v3/D16):
#   release   — the real thing. version must equal config.aztecVersion AND every package
#               version; REQUIRES expected-head-sha (== GITHUB_SHA) and compare-against
#               (== the 0.0.0-canary.g<sha> rehearsal of this exact commit).
#   rehearsal — full-pipeline dry run. version must be 0.0.0-canary.g<short-sha of HEAD>;
#               package manifests are overlaid to that version before pack (peers stay at
#               the lockstep Aztec version). Publishes immutable junk versions by design.
#   revision  — any repo-side improvement to a published lockstep version that cannot bump
#               the version number (the version is locked to Aztec). Ships as
#               <aztecVersion>-revision.N (e.g. 5.0.1-revision.1): overlay like rehearsal,
#               bindings like release (expected-head-sha + compare-against of ITS rehearsal).
#               dist-tag derives from the prerelease segment (`revision`); pass set-latest=true
#               to publish the revision under `latest` instead (a revision-only escape hatch —
#               publish-time `--tag latest`, OIDC-authorized; a second tag would need manual OTP).
#
# Fail-closed backstop in ALL modes: every packed tarball's embedded manifest is asserted
# (name, version == input, @aztec/* peers == aztecVersion, internal pins == input) —
# `npm publish <tarball>` publishes what is IN the tarball, so a mis-configured dispatch
# dies here instead of publishing the committed version under the wrong label.
#
# OIDC least privilege: the build job (no id-token) produces sha256-manifested tarballs;
# the publish job (id-token: write, full-SHA-pinned actions, exact-pinned npm) only
# downloads, verifies, and publishes them. Publish order: benchmark → fee-payment.

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish (no v prefix). release mode — must equal config.aztecVersion + all package versions; rehearsal — 0.0.0-canary.g<short-sha>; revision — <aztecVersion>-revision.N (e.g. 5.0.1-revision.1)
        required: true
        type: string
      mode:
        description: release = real publish · rehearsal = full-pipeline dry run with junk version · revision = repo-side improvement to a published lockstep version, via overlay
        required: true
        type: choice
        default: release
        options: [release, rehearsal, revision]
      expected-head-sha:
        description: REQUIRED for release/revision — full commit SHA this run must execute (the rehearsed commit). Leave empty for rehearsal.
        required: false
        type: string
      compare-against:
        description: REQUIRED for release/revision — the rehearsal version (0.0.0-canary.g<sha7>) whose registry tarballs this build must byte-match. Leave empty for rehearsal.
        required: false
        type: string
      set-latest:
        description: revision mode ONLY — publish the revision under the `latest` dist-tag (publish-time --tag latest). Rejected in release/rehearsal. Default false → the revision goes to the `revision` tag.
        required: false
        type: boolean
        default: false

permissions:
  contents: read

# Single source of truth for WHICH packages this pipeline publishes (space-separated dir
# names under packages/, each expected to hold a manifest named @alejoamiras/<dir>). Every
# publish/assert loop and the arity backstop derive from this one list — so a package add/
# remove/rename (Phase D) updates the machinery from here, not ~9 duplicated `for pkg in ...`
# loops. NOTE: the human-facing release-notes template (render step) still hardcodes package
# names + install commands (it carries per-package prose this list can't generate) — a
# fail-closed guard there asserts each RELEASE_PACKAGES name appears in the rendered notes, so
# a rename that forgets the template fails the run rather than shipping wrong install text.
# Publish order is significant (benchmark before fee-payment); keep it in this order.
env:
  RELEASE_PACKAGES: "aztec-benchmark private-fee-juice"

# The choreography is ≥3 dispatches per release (rehearsal, recovery drill, release);
# overlapping runs would race the shared canary dist-tag and each other's preflight
# reads. Serialize, never cancel (a cancelled half-published run is worse than a queue).
concurrency:
  group: release-pipeline
  cancel-in-progress: false

jobs:
  validate:
    name: Validate inputs + render notes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      dist-tag: ${{ steps.derive.outputs.dist_tag }}
      prerelease-flag: ${{ steps.derive.outputs.prerelease_flag }}
      aztec-version: ${{ steps.derive.outputs.aztec_version }}
    steps:
      - uses: actions/checkout@v6
      - name: Check main branch
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Releases run from main only (got ${GITHUB_REF})" >&2
            exit 1
          fi
      - name: Validate policy + derive dist-tag via scripts/release-policy.mjs
        id: derive
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_MODE: ${{ inputs.mode }}
          SET_LATEST: ${{ inputs.set-latest }}
        run: |
          AZTEC_VERSION=$(node -p "require('./package.json').config.aztecVersion")
          # release-policy.mjs is the ONE place the version-shape + set-latest + dist-tag
          # policy lives (mode/version shape, revision base==aztec, set-latest is revision-
          # only, tag derivation). It prints dist_tag/prerelease_flag or exits 1 with the
          # reason. node --test scripts/release-policy.test.mjs covers the same code, so this
          # shell branch can never drift from the tested matrix. (The runtime/IO bindings —
          # per-package version equality, rehearsal-names-THIS-commit, expected-head-sha /
          # compare-against — need the live checkout and stay in the next step.)
          # A policy violation makes the helper exit 1 (reason on stderr) and this step fails.
          POLICY=$(node scripts/release-policy.mjs "$INPUT_MODE" "$INPUT_VERSION" "$AZTEC_VERSION" "$SET_LATEST")
          # Defense-in-depth: the helper MUST emit a non-empty dist_tag. If it ever exits 0 with
          # empty stdout (e.g. a broken main-module guard), refuse — an empty DIST_TAG reaching
          # `npm publish --tag ""` could mis-tag a canary/revision onto latest.
          if ! printf '%s\n' "$POLICY" | grep -q '^dist_tag=.'; then
            echo "release-policy.mjs produced no dist_tag (output: '$POLICY')" >&2; exit 1
          fi
          {
            printf '%s\n' "$POLICY"
            echo "aztec_version=$AZTEC_VERSION"
          } >> "$GITHUB_OUTPUT"
          echo "policy OK: mode=$INPUT_MODE version=$INPUT_VERSION set-latest=$SET_LATEST (aztec $AZTEC_VERSION)"
      - name: Assert package manifests match RELEASE_PACKAGES
        run: |
          # Every dir in the single-source list must hold a manifest named @alejoamiras/<dir>.
          # This is what lets Phase D's rename be a one-line RELEASE_PACKAGES edit: if a dir is
          # renamed without its package name, or vice versa, the pipeline fails HERE, not mid-publish.
          for pkg in $RELEASE_PACKAGES; do
            name=$(node -p "require('./packages/$pkg/package.json').name")
            if [ "$name" != "@alejoamiras/$pkg" ]; then
              echo "packages/$pkg is named '$name', expected '@alejoamiras/$pkg'" >&2; exit 1
            fi
          done
          echo "package manifests OK: $RELEASE_PACKAGES"
      - name: Check release bindings (IO + SHA)
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_MODE: ${{ inputs.mode }}
          EXPECTED_SHA: ${{ inputs.expected-head-sha }}
          COMPARE_AGAINST: ${{ inputs.compare-against }}
        run: |
          # Version/mode SHAPE + set-latest already validated by release-policy.mjs above.
          # This step owns only the checks that need the live checkout / runtime SHA.
          SHORT_SHA="${GITHUB_SHA:0:7}"
          case "$INPUT_MODE" in
            release)
              # Committed package versions must equal the release version (lockstep).
              for pkg in $RELEASE_PACKAGES; do
                PKG_VERSION=$(node -p "require('./packages/$pkg/package.json').version")
                if [ "$INPUT_VERSION" != "$PKG_VERSION" ]; then
                  echo "release mode: input $INPUT_VERSION != packages/$pkg version $PKG_VERSION" >&2; exit 1
                fi
              done
              ;;
            rehearsal)
              if [ "$INPUT_VERSION" != "0.0.0-canary.g${SHORT_SHA}" ]; then
                echo "rehearsal mode: version $INPUT_VERSION does not name THIS commit (expected 0.0.0-canary.g${SHORT_SHA})" >&2; exit 1
              fi
              if [ -n "$EXPECTED_SHA" ] || [ -n "$COMPARE_AGAINST" ]; then
                echo "rehearsal mode: expected-head-sha / compare-against must be empty" >&2; exit 1
              fi
              ;;
          esac
          # Mandatory rehearsal binding for anything that can touch real consumers
          # (a bare dispatch must NOT be able to bypass the rehearsal controls).
          if [ "$INPUT_MODE" = "release" ] || [ "$INPUT_MODE" = "revision" ]; then
            if [ -z "$EXPECTED_SHA" ] || [ -z "$COMPARE_AGAINST" ]; then
              echo "$INPUT_MODE mode: expected-head-sha AND compare-against are REQUIRED" >&2; exit 1
            fi
            if [ "$GITHUB_SHA" != "$EXPECTED_SHA" ]; then
              echo "$INPUT_MODE mode: HEAD $GITHUB_SHA != expected-head-sha $EXPECTED_SHA (re-rehearse this commit)" >&2; exit 1
            fi
            if [ "$COMPARE_AGAINST" != "0.0.0-canary.g${EXPECTED_SHA:0:7}" ]; then
              echo "$INPUT_MODE mode: compare-against $COMPARE_AGAINST is not the rehearsal of $EXPECTED_SHA (expected 0.0.0-canary.g${EXPECTED_SHA:0:7})" >&2; exit 1
            fi
          fi
          echo "Bindings OK: mode $INPUT_MODE, version $INPUT_VERSION, HEAD $GITHUB_SHA"
      - name: Verify Nargo git refs against committed lock
        run: ./scripts/verify-nargo-refs.sh
      - name: Render release notes (pre-publish — fails fast, reused verbatim by tag-release)
        env:
          INPUT_VERSION: ${{ inputs.version }}
          AZTEC_VERSION: ${{ steps.derive.outputs.aztec_version }}
          DIST_TAG: ${{ steps.derive.outputs.dist_tag }}
        run: |
          cat > release-notes.md <<'TEMPLATE'
          Aztec ecosystem packages `__VERSION__`, targeting **Aztec `__AZTEC_VERSION__`**. Both packages are published with [npm provenance attestations](https://docs.npmjs.com/generating-provenance-statements) via a tokenless OIDC pipeline that re-runs the full test matrix before publishing.

          ## 📦 Packages

          | Package | What it is |
          |---|---|
          | [`@alejoamiras/private-fee-juice`](https://www.npmjs.com/package/@alejoamiras/private-fee-juice) | Private Fee Payment Contract (FPC) + TypeScript SDK |
          | [`@alejoamiras/aztec-benchmark`](https://www.npmjs.com/package/@alejoamiras/aztec-benchmark) | Benchmark CLI + CI tooling (circuit gates, DA/L2 gas, proving) |

          ## 🚀 Install

          Use `__VERSION__` with an Aztec `__AZTEC_VERSION__` node/sandbox — `@aztec/*` peer dependencies install automatically. This release is also available under the `__DIST_TAG__` dist-tag.

          ```bash
          bun add @alejoamiras/private-fee-juice@__VERSION__
          bun add -D @alejoamiras/aztec-benchmark@__VERSION__
          ```

          Verify provenance end-to-end: `npm audit signatures`

          ## 📣 aztec-standards has moved

          The Aztec Foundation now owns and publishes aztec-standards as [`@aztec-foundation/aztec-standards`](https://www.npmjs.com/package/@aztec-foundation/aztec-standards) (repo: [AztecProtocol/aztec-standards](https://github.com/AztecProtocol/aztec-standards)). `@alejoamiras/aztec-standards` is retired and will receive no further releases — migrate to the Foundation package.

          ## ⚠️ Compatibility notes at 5.0.1

          - No package-local API changes in `private-fee-juice` or `aztec-benchmark` in the initial 5.0.1 release. (`revision` mode / `-revision.N` dispatches: hand-edit this section before releasing — it describes 5.0.1, not your fix.)
          - Upstream Aztec `5.0.1` includes two breaking changes enforced through the exact `@aztec/*` peers: the fee payer must be set in the non-revertible phase ([#24479](https://github.com/AztecProtocol/aztec-packages/pull/24479)), and note-history validation helpers are re-siloed/renamed ([#24644](https://github.com/AztecProtocol/aztec-packages/pull/24644)).
          - **The canonical PrivateFPC address CHANGED at 5.0.1** (recompiled bytecode): the 5.0.1 canonical address is `0x1a6d21ce5fd80137df0e99632a4ca17e58a42dc8f6c08191a96ca8ae907a1bc0`. The 5.0.0 address `0x257aa8701e8801b2c03a6b03cdf385c4fa9200efda1dc41f94a905980efc86e9` is STALE for 5.0.1 — funds bridged to a stale-version address are unrecoverable. Always read the address from the `canonical-deployment.json` of the version you install.

          ## 📚 Docs & migration

          - Per-package usage: [private-fee-juice](https://github.com/alejoamiras/ecosystem-tooling/tree/main/packages/private-fee-juice#readme) · [aztec-benchmark](https://github.com/alejoamiras/ecosystem-tooling/tree/main/packages/aztec-benchmark#readme)
          - Migrating from `@defi-wonderland/*`: scope swap — [migration table](https://github.com/alejoamiras/ecosystem-tooling#migrating-from-defi-wonderland)
          TEMPLATE
          sed -i "s/__VERSION__/$INPUT_VERSION/g; s/__AZTEC_VERSION__/$AZTEC_VERSION/g; s/__DIST_TAG__/$DIST_TAG/g" release-notes.md
          if grep -q "__" release-notes.md; then
            echo "unreplaced placeholder in notes" >&2; exit 1
          fi
          # Fail-closed: the notes template hardcodes package names + install commands (they
          # carry per-package prose the RELEASE_PACKAGES loops can't generate). Assert every
          # published package is actually named in the rendered notes — so a package
          # add/rename that updated RELEASE_PACKAGES but forgot this template FAILS here instead
          # of shipping a GitHub release that points users at a name that no longer exists.
          for pkg in $RELEASE_PACKAGES; do
            if ! grep -q "@alejoamiras/$pkg" release-notes.md; then
              echo "release notes do not mention @alejoamiras/$pkg — update the notes template for the renamed/added package" >&2; exit 1
            fi
          done
      - uses: actions/upload-artifact@v6
        with:
          name: release-notes
          path: release-notes.md

  fee-payment-checks:
    name: Fee Payment
    needs: validate
    uses: ./.github/workflows/_package-checks.yml
    with:
      package-dir: packages/private-fee-juice
      min-txe-tests: 11

  benchmark-build:
    name: Benchmark build
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: bun install --frozen-lockfile
      - run: bun run --cwd packages/aztec-benchmark typecheck
      - run: bun run --cwd packages/aztec-benchmark build
      - run: bun run --cwd packages/aztec-benchmark start --help

  build:
    name: Build + pack (no publish credentials)
    needs: [validate, fee-payment-checks, benchmark-build]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-aztec
        with:
          start-local-network: 'false'
          run-compile: 'false'
          run-codegen: 'false'

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Re-verify Nargo refs at compile time (narrows the validate→build TOCTOU window)
        # NOTE: narrows, does not fully close — aztec compile still re-resolves the tags
        # independently a moment later. Full closure (compile from the locked commit) is a
        # roadmap/ /harden item. This catches a tag that moved during the checks matrix.
        run: ./scripts/verify-nargo-refs.sh

      - name: Overlay version (rehearsal/revision — AFTER frozen install, BEFORE build/pack)
        if: inputs.mode != 'release'
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: bun scripts/overlay-version.ts "$INPUT_VERSION"

      - name: Build all packages
        run: |
          bun run --cwd packages/aztec-benchmark build
          (cd packages/private-fee-juice && aztec compile && aztec codegen target --outdir src/artifacts -f && bunx tsc --project tsconfig.build.json)

      - name: Verify tarball surfaces (pre-publish gate)
        run: bun scripts/verify-tarball.ts packages/aztec-benchmark packages/private-fee-juice

      - name: Pack + assert embedded manifests (fail-closed version backstop)
        env:
          INPUT_VERSION: ${{ inputs.version }}
          AZTEC_VERSION: ${{ needs.validate.outputs.aztec-version }}
        run: |
          mkdir -p release-tarballs
          for pkg in $RELEASE_PACKAGES; do
            (cd "packages/$pkg" && npm pack --pack-destination "$GITHUB_WORKSPACE/release-tarballs" > /dev/null)
          done
          ls -la release-tarballs/
          # Arity is itself fail-closed: symmetric edits dropping a SURVIVING package from
          # both the publish and assert loops would otherwise release silently-partially.
          # The expected count derives from RELEASE_PACKAGES (single source), not a literal.
          EXPECTED_COUNT=$(echo "$RELEASE_PACKAGES" | wc -w)
          TARBALL_COUNT=$(find release-tarballs -name '*.tgz' | wc -l)
          if [ "$TARBALL_COUNT" -ne "$EXPECTED_COUNT" ]; then
            echo "expected exactly $EXPECTED_COUNT tarballs, packed $TARBALL_COUNT" >&2; exit 1
          fi
          for pkg in $RELEASE_PACKAGES; do
            tgz=$(ls release-tarballs/alejoamiras-"${pkg}"-*.tgz)
            bun scripts/assert-tarball-meta.ts "$tgz" "@alejoamiras/$pkg" "$INPUT_VERSION" "$AZTEC_VERSION"
          done
          (cd release-tarballs && shasum -a 256 ./*.tgz > SHA256SUMS && cat SHA256SUMS)

      - name: Compare payload against rehearsed baseline (release/revision)
        if: inputs.mode != 'rehearsal'
        env:
          COMPARE_AGAINST: ${{ inputs.compare-against }}
          EXPECTED_SHA: ${{ inputs.expected-head-sha }}
        run: |
          mkdir -p baseline-tarballs
          for pkg in $RELEASE_PACKAGES; do
            name="@alejoamiras/$pkg"
            url=$(npm view "$name@$COMPARE_AGAINST" dist.tarball)
            integrity=$(npm view "$name@$COMPARE_AGAINST" dist.integrity)
            curl -sf "$url" -o "baseline-tarballs/$pkg.tgz"
            got="sha512-$(openssl dgst -sha512 -binary "baseline-tarballs/$pkg.tgz" | base64 -w0)"
            if [ "$got" != "$integrity" ]; then
              echo "baseline integrity mismatch for $name@$COMPARE_AGAINST" >&2; exit 1
            fi
            ./scripts/verify-attestation-identity.sh "$name" "$COMPARE_AGAINST" "$EXPECTED_SHA"
            fresh=$(ls release-tarballs/alejoamiras-"${pkg}"-*.tgz)
            ./scripts/compare-tarball-payload.sh "$fresh" "baseline-tarballs/$pkg.tgz"
          done

      - uses: actions/upload-artifact@v6
        with:
          name: release-tarballs
          path: release-tarballs/

  publish:
    name: Publish (trusted publishing + provenance)
    needs: [validate, build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      # This job holds OIDC authority: every action full-SHA pinned, no toolchain
      # downloads, no build steps — it publishes pre-hashed tarballs and nothing else.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: release-tarballs
          path: release-tarballs/

      - name: Verify tarball checksums (handoff integrity)
        run: cd release-tarballs && shasum -a 256 -c SHA256SUMS

      - name: Exact-pin npm (OIDC/provenance-capable CLI)
        run: |
          npm install -g npm@11.18.0
          [ "$(npm -v)" = "11.18.0" ] || { echo "npm version drift: $(npm -v)" >&2; exit 1; }

      - name: Preflight — fresh release requires absent versions; recovery requires identity + tag
        env:
          INPUT_VERSION: ${{ inputs.version }}
          DIST_TAG: ${{ needs.validate.outputs.dist-tag }}
        run: |
          published=()
          for pkg in $RELEASE_PACKAGES; do
            # Retried: a lagging read right after a partial publish would misclassify a
            # recovery re-run as fresh and then die on E409 at publish.
            got=""
            for _ in 1 2 3 4 5; do
              got=$(npm view "@alejoamiras/$pkg@$INPUT_VERSION" version 2>/dev/null || true)
              [ -n "$got" ] && break
              sleep 15
            done
            if [ "$got" = "$INPUT_VERSION" ]; then
              published+=("$pkg")
            fi
          done
          if [ "${#published[@]}" -eq 0 ]; then
            echo "fresh run: no target versions on the registry" && exit 0
          fi
          echo "recovery run — already published: ${published[*]} (verifying integrity + attestation identity + dist-tag before accepting)"
          for pkg in "${published[@]}"; do
            integrity=$(npm view "@alejoamiras/$pkg@$INPUT_VERSION" dist.integrity)
            local_tgz=$(ls release-tarballs/alejoamiras-"${pkg}"-*.tgz)
            got="sha512-$(openssl dgst -sha512 -binary "$local_tgz" | base64 -w0)"
            if [ "$got" != "$integrity" ]; then
              echo "ERROR: published $pkg@$INPUT_VERSION does NOT match the locally built tarball — refusing recovery" >&2; exit 1
            fi
            ./scripts/verify-attestation-identity.sh "@alejoamiras/$pkg" "$INPUT_VERSION" "$GITHUB_SHA"
            # Fail-closed on tag identity (OIDC can only publish, never repair a dist-tag). The
            # helper retries against the documented >10min dist-tags read-lag before judging, so a
            # correct-but-un-propagated tag is not mistaken for a wrong one.
            ./scripts/verify-dist-tag.sh "@alejoamiras/$pkg" "$INPUT_VERSION" "$DIST_TAG"
          done

      - name: Publish tarballs (benchmark → fee-payment, idempotent)
        env:
          INPUT_VERSION: ${{ inputs.version }}
          DIST_TAG: ${{ needs.validate.outputs.dist-tag }}
        run: |
          for pkg in $RELEASE_PACKAGES; do
            if [ "$(npm view "@alejoamiras/$pkg@$INPUT_VERSION" version 2>/dev/null || true)" = "$INPUT_VERSION" ]; then
              # A package can become visible AFTER preflight's scan (verify-then-recheck
              # race) — never skip on visibility alone; repeat the full integrity +
              # certificate-identity acceptance check at the point of skipping.
              integrity=$(npm view "@alejoamiras/$pkg@$INPUT_VERSION" dist.integrity)
              local_tgz=$(ls release-tarballs/alejoamiras-"${pkg}"-*.tgz)
              got="sha512-$(openssl dgst -sha512 -binary "$local_tgz" | base64 -w0)"
              if [ "$got" != "$integrity" ]; then
                echo "ERROR: $pkg@$INPUT_VERSION appeared on the registry but does NOT match this run's tarball — refusing to continue" >&2; exit 1
              fi
              ./scripts/verify-attestation-identity.sh "@alejoamiras/$pkg" "$INPUT_VERSION" "$GITHUB_SHA"
              # Fail-closed on tag identity (OIDC can only publish, never repair a dist-tag): the
              # desired tag must ALREADY point at this version (set by the prior run's publish-time
              # --tag). Same read-lag-tolerant helper as preflight — never a silent mutation.
              ./scripts/verify-dist-tag.sh "@alejoamiras/$pkg" "$INPUT_VERSION" "$DIST_TAG"
              echo "@alejoamiras/$pkg@$INPUT_VERSION already published, dist-tag '$DIST_TAG' correct — skipping (integrity + identity + tag re-verified at skip time)"
              continue
            fi
            tgz=$(ls release-tarballs/alejoamiras-"${pkg}"-*.tgz)
            # ./ prefix is load-bearing: without it npm's spec parser reads
            # "release-tarballs/<file>" as a GitHub owner/repo shorthand and
            # tries `git ls-remote ssh://git@github.com/...` (rehearsal #1 failure).
            npm publish "./$tgz" --access public --provenance --tag "$DIST_TAG"
          done

      - name: Assert published state (dist-tags + integrity + attestation identity)
        env:
          INPUT_VERSION: ${{ inputs.version }}
          DIST_TAG: ${{ needs.validate.outputs.dist-tag }}
        run: |
          fail=0
          for pkg in $RELEASE_PACKAGES; do
            # Read-API lag after publish can exceed several minutes — retry before judging.
            got=""
            for attempt in $(seq 1 30); do
              got=$(npm view "@alejoamiras/$pkg@$INPUT_VERSION" version 2>/dev/null || true)
              [ "$got" = "$INPUT_VERSION" ] && break
              echo "  view attempt $attempt for $pkg@$INPUT_VERSION: not visible yet, waiting 20s..."
              sleep 20
            done
            if [ "$got" != "$INPUT_VERSION" ]; then
              echo "ERROR: @alejoamiras/$pkg@$INPUT_VERSION not resolvable after 10min" >&2; fail=1; continue
            fi
            # Registry read-lag applies to EVERY read here, not just version visibility
            # (documented >10 min) — retry dist-tags/integrity before judging.
            tagged=""
            for _ in $(seq 1 15); do
              tags=$(npm view "@alejoamiras/$pkg" dist-tags --json 2>/dev/null || echo '{}')
              tagged=$(echo "$tags" | node -pe "JSON.parse(require('fs').readFileSync(0,'utf8'))['$DIST_TAG'] ?? ''")
              [ "$tagged" = "$INPUT_VERSION" ] && break
              sleep 20
            done
            echo "@alejoamiras/$pkg dist-tags: $tags"
            if [ "$tagged" != "$INPUT_VERSION" ]; then
              echo "ERROR: dist-tag $DIST_TAG for $pkg is '$tagged', expected $INPUT_VERSION" >&2; fail=1
            fi
            latest=$(echo "$tags" | node -pe "JSON.parse(require('fs').readFileSync(0,'utf8')).latest ?? ''")
            case "$latest" in
              0.0.0-*)
                # canary.yml's old hygiene assert, kept in ALL modes: a first-publish can
                # force `latest` onto junk; OIDC can't move tags, so surface it loudly.
                echo "ERROR: latest for $pkg points at a canary ($latest) — run the manual dist-tag runbook step (docs/ci-pipeline.md)" >&2
                fail=1
                ;;
            esac
            integrity=""
            for _ in 1 2 3 4 5; do
              integrity=$(npm view "@alejoamiras/$pkg@$INPUT_VERSION" dist.integrity 2>/dev/null || true)
              [ -n "$integrity" ] && break
              sleep 15
            done
            local_tgz=$(ls release-tarballs/alejoamiras-"${pkg}"-*.tgz)
            local_integrity="sha512-$(openssl dgst -sha512 -binary "$local_tgz" | base64 -w0)"
            if [ "$integrity" != "$local_integrity" ]; then
              echo "ERROR: registry integrity for $pkg@$INPUT_VERSION differs from the tarball this run built" >&2; fail=1
            fi
            ./scripts/verify-attestation-identity.sh "@alejoamiras/$pkg" "$INPUT_VERSION" "$GITHUB_SHA" || fail=1
          done
          exit "$fail"

  tag-release:
    name: Tag + GitHub release
    needs: [validate, publish]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v6
        with:
          name: release-notes
      - name: Create tag and release (idempotent — safe on recovery re-runs)
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ inputs.version }}
          PRERELEASE_FLAG: ${{ needs.validate.outputs.prerelease-flag }}
        run: |
          TAG="v$INPUT_VERSION"
          # Annotated tags: ls-remote's plain line is the TAG OBJECT sha; the peeled
          # ^{} line is the commit. Prefer peeled so idempotency survives either style.
          peeled=$(git ls-remote origin "refs/tags/$TAG^{}" | cut -f1)
          plain=$(git ls-remote origin "refs/tags/$TAG" | awk '$2 == "refs/tags/'"$TAG"'" {print $1}')
          existing="${peeled:-$plain}"
          if [ -n "$existing" ]; then
            if [ "$existing" != "$GITHUB_SHA" ]; then
              echo "ERROR: tag $TAG exists at $existing, not at this run's $GITHUB_SHA" >&2; exit 1
            fi
            echo "tag $TAG already exists at this commit — ok (re-run)"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "release $TAG exists — updating notes (re-run)"
            gh release edit "$TAG" --notes-file release-notes.md
          else
            args=(release create "$TAG" --title "$TAG" --notes-file release-notes.md)
            [ -n "$PRERELEASE_FLAG" ] && args+=("$PRERELEASE_FLAG")
            gh "${args[@]}"
          fi
